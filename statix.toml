# statix (nix static analysis) configuration — see task 101.
#
# hosts/*/hardware-configuration.nix is excluded by path (not hand-edited) because it is
# auto-generated by `nixos-generate-config` and carries a "Do not modify this file!" header;
# regenerating it would silently revert any hand-fix, so W20 repeated-keys findings there are
# permanently exempted here instead. This exclusion is path-based (glob), not line-based, so it
# survives regeneration without maintenance.
disabled = []
ignore = [".direnv", "hosts/*/hardware-configuration.nix"]
